<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activties</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
</head>
<body>

  <table>
    <thead>
      {% for field_name in field_names %}
      <td>{{ field_name }}</td>
      {% endfor %}
    </thead>
    {% for activity in activities %}
    <tr>
      {% for field_name in field_names %}
      <td>{{ activity.get(field_name) }}</td>
      {% endfor %}
      <td>
        <form method="put" id="check_{{ activity.id }}">
          <input type="submit" class="checkmark" value="{{ '\u2713' }}"/>
        </form>
      </td>
      <td>
        <form method="delete" id="delete_{{ activity.id }}">
          <input type="submit" class="trashcan" value="{{ '\U0001F5D1' }}"/>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>

</body>
</html>
